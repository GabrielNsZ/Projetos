<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>ATLAS Global - Decision Support (SAR)</title>
        <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
        <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    </head>
    <body>
        <div id="sidebar">
            <h2>ATLAS Global</h2>
            <p style="font-size: 0.8em; color: #888;">Busca e Resgate em Áreas Isoladas</p>
            
            <div class="section-title">Logística da Missão</div>
            <div class="control-group">
                <label>1. Ponto de Apoio (Base/Saúde)</label>
                <select id="supportNode">
                    <option value="bombeiros_centro">Corpo de Bombeiros (Centro)</option>
                    <option value="upa_mogilar">UPA Mogilar</option>
                </select>

                <label>2. Local do Chamado (Denúncia)</label>
                <select id="callNode">
                    <option value="chamado_01">Ocorrência: Ricardo Vilela</option>
                    <option value="chamado_02">Alerta: Altos do Ipiranga</option>
                </select>

                <label>3. Alvo do Resgate (Desastre)</label>
                <select id="disasterNode">
                    <option value="desastre_encosta">Deslizamento: Itapety</option>
                    <option value="acidente_rodovia">Acidente: Mogi-Bertioga</option>
                </select>
            </div>

            <div class="section-title">Parâmetros do Motor</div>
            <div class="control-group">
                <label>Algoritmo de Otimização</label>
                <select id="algo">
                    <option value="dijkstra">Dijkstra (Melhor Rota/Custo)</option>
                    <option value="bfs">BFS (Menos Conexões)</option>
                </select>
            </div>

            <button id="btnCalcular">EXECUTAR PLANO DE RESGATE</button>

            <div id="resultsPanel" class="results-panel" style="display: none;">
                <div class="section-title" style="margin-top: 0; color: #00ff00;">Dados da Trajetória</div>
                <div class="result-item">
                    <span>Custo da Operação:</span>
                    <span id="totalCost" class="result-value">--</span>
                </div>
                <div class="result-item">
                    <span>Pontos de Controle:</span>
                    <span id="nodeCount" class="result-value">--</span>
                </div>
                <div class="status-box" id="output">
                    Rota calculada com sucesso.
                </div>
            </div>
        </div>

        <div id="map"></div>

        <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
        <script>
            const map = L.map('map').setView([-23.5218, -46.1853], 15);
            L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', { 
                maxZoom: 19,
                attribution: '© OpenStreetMap'
            }).addTo(map);

            let currentRouteLayer = null;

            async function traceRoute() {
                console.log("Iniciando cálculo estratégico...");
                
                const output = document.getElementById('output');
                const costDiv = document.getElementById('totalCost');
                const nodeDiv = document.getElementById('nodeCount');
                const resultsPanel = document.getElementById('resultsPanel');
                
                const support = document.getElementById('supportNode').value;
                const call = document.getElementById('callNode').value;
                const disaster = document.getElementById('disasterNode').value;
                const method = document.getElementById('algo').value;

                output.innerHTML = "<strong>Processando:</strong> Calculando trajetória...";

                try {
                    const response = await fetch(`/route/${method}/${support}/${call}/${disaster}`);
                    if (!response.ok) throw new Error(`Erro: ${response.status}`);

                    const data = await response.json();

                    if (currentRouteLayer) map.removeLayer(currentRouteLayer);

                    const latlngs = data.path.map(p => [p.lat, p.lng]);
                    currentRouteLayer = L.polyline(latlngs, {
                        color: '#39FF14',
                        weight: 7,
                        opacity: 0.9
                    }).addTo(map);

                    map.fitBounds(currentRouteLayer.getBounds());

                    resultsPanel.style.display = 'block';
                    costDiv.innerHTML = data.total_cost;
                    nodeDiv.innerHTML = data.path.length;
                    output.innerHTML = `Rota estratégica via ${method.toUpperCase()} finalizada.`;

                } catch (err) {
                    console.error("Erro no motor ATLAS:", err);
                    output.innerHTML = "Erro ao conectar com o motor de busca ATLAS.";
                    resultsPanel.style.display = 'none';
                }
            }

            document.getElementById('btnCalcular').onclick = traceRoute;
        </script>
    </body>
</html>
