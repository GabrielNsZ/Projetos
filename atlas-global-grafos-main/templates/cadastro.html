<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - ATLAS Global</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="cadastro-container">
        <div class="cadastro-box">
            <h2>Cadastro de Operador</h2>
            <p>Registre-se na plataforma ATLAS Global</p>
            
            <form action="/cadastrar" method="POST">
                <div class="input-group">
                    <label for="nome">Nome Completo</label>
                    <input type="text" id="nome" name="nome" required>
                </div>

                <div class="input-group">
                    <label for="email">E-mail Corporativo</label>
                    <input type="email" id="email" name="email" required>
                </div>

                <div class="input-group">
                    <label for="especialidade">Especialidade</label>
                    <select id="especialidade" name="especialidade" required>
                        <option value="">Selecione...</option>
                        <option value="resgate">Equipe de Resgate</option>
                        <option value="logistica">Logística e Suporte</option>
                        <option value="coordenacao">Coordenação Estratégica</option>
                    </select>
                </div>

                <div class="input-group">
                    <label for="senha">Senha</label>
                    <input type="password" id="senha" name="senha" required>
                </div>

                <button type="submit" class="btn-submit">Registrar</button>
            </form>
        </div>
    </div>
</body>
</html>
